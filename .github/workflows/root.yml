name: Root CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "docker-compose.yml"
      - "README.md"
      - ".editorconfig"
      - "frontend/.prettierrc"
      - "frontend/eslint.config.*"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/**"

  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "docker-compose.yml"
      - "README.md"
      - ".editorconfig"
      - "frontend/.prettierrc"
      - "frontend/eslint.config.*"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/**"

jobs:
  validate-frontend-config:
    name: Validate Frontend Config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Validate Prettier config
        run: npm run prettier:check
      - name: Validate ESLint config
        run: npm run lint
      - name: Validate custom lint config
        run: npm run lint:custom
