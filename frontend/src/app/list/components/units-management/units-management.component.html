<div class="container">
  <div class="page-header">
    <h1>Manage Units</h1>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else if (error() && !units().length) {
    <div class="error-container">
      <mat-card appearance="outlined" class="error-card">
        <mat-card-content>
          <mat-icon color="warn">error</mat-icon>
          <p>Error loading units. Please try again later.</p>
          <button mat-stroked-button color="primary" (click)="loadUnits()">
            Try Again
          </button>
        </mat-card-content>
      </mat-card>
    </div>
  } @else {
    <div class="add-unit-container mb-3">
      <button mat-raised-button color="primary" (click)="openNewUnitDialog()">
        <mat-icon>add</mat-icon> New Unit
      </button>
    </div>

    @if (units().length) {
      <mat-card appearance="outlined">
        <mat-card-content>
          <table mat-table [dataSource]="units()" class="unit-table">
            <!-- Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let element">{{ element.name }}</td>
            </ng-container>

            <!-- Symbol Column -->
            <ng-container matColumnDef="symbol">
              <th mat-header-cell *matHeaderCellDef>Symbol</th>
              <td mat-cell *matCellDef="let element">{{ element.symbol }}</td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let element">
                <button
                  mat-icon-button
                  color="primary"
                  (click)="editUnit(element)"
                  aria-label="Edit Unit"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  color="warn"
                  (click)="deleteUnit(element)"
                  aria-label="Delete Unit"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </mat-card-content>
      </mat-card>
    } @else {
      <mat-card appearance="outlined" class="empty-state">
        <mat-card-content>
          <p>No units registered.</p>
          <button
            mat-raised-button
            color="primary"
            (click)="openNewUnitDialog()"
          >
            Add First Unit
          </button>
        </mat-card-content>
      </mat-card>
    }
  }
</div>
